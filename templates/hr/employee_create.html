{% extends "base.html" %}
{% block title %}新增員工 - Createx{% endblock %}
{% block page_title %}新增員工{% endblock %}
{% block page_subtitle %}建立員工主檔資料{% endblock %}
{% block content %}
<div class="card" style="max-width: 960px;">
    <form method="post">
        <label>系統帳號</label>
        <select name="user_id">
            <option value="">不綁定</option>
            {% for u in available_users %}
            <option value="{{ u.id }}">{{ u.username }}{% if u.display_name %} - {{ u.display_name }}{% endif %}</option>
            {% endfor %}
        </select>

        <label>員工編號</label>
        <input type="text" name="employee_no" value="{{ suggested_employee_no }}">

        <label>姓名</label>
        <input type="text" name="name" required>

        <label>英文名</label>
        <input type="text" name="english_name">

        <label>暱稱</label>
        <input type="text" name="nickname">

        <label>性別</label>
        <input type="text" name="gender">

        <label>生日</label>
        <input type="date" name="birthday">

        <label>手機</label>
        <input type="text" name="phone">

        <label>Email</label>
        <input type="email" name="email">

        <label>地址</label>
        <textarea name="address" rows="3"></textarea>

        <label>緊急聯絡人</label>
        <input type="text" name="emergency_contact_name">

        <label>緊急聯絡電話</label>
        <input type="text" name="emergency_contact_phone">

        <label>狀態</label>
        <select name="status">
            <option value="active">在職</option>
            <option value="probation">試用</option>
            <option value="leave">留停</option>
            <option value="terminated">離職</option>
        </select>

        <label>到職日</label>
        <input type="date" name="hire_date">

        <label>離職日</label>
        <input type="date" name="leave_date">

        <label>部門</label>
        <select name="department_id">
            <option value="">請選擇</option>
            {% for d in departments %}<option value="{{ d.id }}">{{ d.name }}</option>{% endfor %}
        </select>

        <label>職稱</label>
        <select name="job_title_id">
            <option value="">請選擇</option>
            {% for jt in job_titles %}<option value="{{ jt.id }}">{{ jt.name }}</option>{% endfor %}
        </select>

        <label>直屬主管</label>
        <select name="manager_employee_id">
            <option value="">請選擇</option>
            {% for m in manager_employees %}<option value="{{ m.id }}">{{ m.employee_no }} - {{ m.name }}</option>{% endfor %}
        </select>

        <label>備註</label>
        <textarea name="notes" rows="4"></textarea>

        <div class="page-actions" style="margin-top:16px;">
            <a href="{{ url_for('hr_employees.index') }}" class="btn btn-secondary">返回</a>
            <button type="submit" class="btn">建立</button>
        </div>
    </form>
</div>
{% endblock %}
