{% extends "base.html" %}
{% block title %}新增出勤紀錄 - Createx{% endblock %}
{% block page_title %}新增出勤紀錄{% endblock %}
{% block page_subtitle %}手動建立或更新員工出勤紀錄{% endblock %}

{% block content %}
<div class="card" style="max-width: 900px;">
    <form method="post">
        <label>員工</label>
        <select name="employee_id" required>
            <option value="">請選擇</option>
            {% for e in employees %}
            <option value="{{ e.id }}">{{ e.employee_no }} - {{ e.name }}</option>
            {% endfor %}
        </select>

        <label>日期</label>
        <input type="date" name="attendance_date" required>

        <label>上班打卡時間</label>
        <input type="datetime-local" name="check_in_time">

        <label>下班打卡時間</label>
        <input type="datetime-local" name="check_out_time">

        <label>狀態</label>
        <select name="status">
            <option value="present">正常出勤</option>
            <option value="late">遲到</option>
            <option value="early_leave">早退</option>
            <option value="absent">缺勤</option>
            <option value="leave">請假</option>
        </select>

        <label>備註</label>
        <textarea name="note" rows="4"></textarea>

        <div class="page-actions">
            <a href="{{ url_for('hr_attendance.attendance_index') }}" class="btn btn-secondary">返回</a>
            <button type="submit" class="btn">建立</button>
        </div>
    </form>
</div>
{% endblock %}
