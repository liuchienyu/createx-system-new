{% extends "base.html" %}

{% block title %}編輯財務紀錄 - Createx{% endblock %}
{% block page_title %}編輯財務紀錄{% endblock %}
{% block page_subtitle %}修改正式財務紀錄{% endblock %}

{% block content %}
<div class="card" style="max-width: 900px;">
    <form method="post">
        <label>日期</label>
        <input type="date" name="record_date" value="{{ record.record_date }}" required>

        <label>收支類型</label>
        <select name="category_type" required>
            <option value="income" {% if record.category_type == 'income' %}selected{% endif %}>收入</option>
            <option value="expense" {% if record.category_type == 'expense' %}selected{% endif %}>支出</option>
        </select>

        <label>分類</label>
        <select name="category_id" required>
            {% for c in income_categories %}
            <option value="{{ c.id }}" {% if record.category_id == c.id %}selected{% endif %}>收入｜{{ c.name }}</option>
            {% endfor %}
            {% for c in expense_categories %}
            <option value="{{ c.id }}" {% if record.category_id == c.id %}selected{% endif %}>支出｜{{ c.name }}</option>
            {% endfor %}
        </select>

        <label>項目名稱</label>
        <input type="text" name="item_name" value="{{ record.item_name }}" required>

        <label>金額</label>
        <input type="number" step="0.01" name="amount" value="{{ record.amount }}" required>

        <label>付款方式</label>
        <input type="text" name="payment_method" value="{{ record.payment_method or '' }}">

        <label>交易對象</label>
        <input type="text" name="counterparty" value="{{ record.counterparty or '' }}">

        <label>綁定專案</label>
        <select name="project_id">
            <option value="">不綁定</option>
            {% for p in projects %}
            <option value="{{ p.id }}" {% if record.project_id == p.id %}selected{% endif %}>{{ p.name }}</option>
            {% endfor %}
        </select>

        <label>備註</label>
        <textarea name="note" rows="4">{{ record.note or '' }}</textarea>

        <div class="page-actions" style="margin-top:16px;">
            <a href="{{ url_for('finance.finance_index') }}" class="btn btn-secondary">返回</a>
            <button type="submit" class="btn">儲存</button>
        </div>
    </form>
</div>
{% endblock %}
