{% extends "base.html" %}

{% block title %}編輯角色 - Createx{% endblock %}
{% block page_title %}編輯角色{% endblock %}
{% block page_subtitle %}修改角色與權限設定{% endblock %}

{% block content %}
<div class="card" style="max-width: 980px;">
    <form method="post">
        <label>角色名稱</label>
        <input type="text" name="name" value="{{ role.name }}" required>

        <label>角色說明</label>
        <textarea name="description" rows="3">{{ role.description or '' }}</textarea>

        <label>權限清單</label>
        {% for p in permissions %}
        <div style="margin-bottom: 8px;">
            <label style="font-weight: normal;">
                <input type="checkbox" name="permission_ids" value="{{ p.id }}" {% if p.id in current_permission_ids %}checked{% endif %}>
                {{ p.code }}{% if p.description %} - {{ p.description }}{% endif %}
            </label>
        </div>
        {% endfor %}

        <div class="page-actions" style="margin-top: 16px;">
            <a href="{{ url_for('admin.roles_index') }}" class="btn btn-secondary">返回</a>
            <button type="submit" class="btn">儲存</button>
        </div>
    </form>
</div>
{% endblock %}
