{% extends "base.html" %}

{% block title %}新增使用者 - Createx{% endblock %}
{% block page_title %}新增使用者{% endblock %}
{% block page_subtitle %}建立新的系統帳號{% endblock %}

{% block content %}
<div class="card" style="max-width: 900px;">
    <form method="post">
        <label>帳號</label>
        <input type="text" name="username" required>

        <label>顯示名稱</label>
        <input type="text" name="display_name">

        <label>密碼</label>
        <input type="password" name="password" required>

        <div style="margin: 12px 0 18px;">
            <label style="font-weight: normal;">
                <input type="checkbox" name="is_active" checked>
                啟用帳號
            </label>
        </div>

        <label>角色</label>
        {% for role in all_roles %}
        <div style="margin-bottom: 8px;">
            <label style="font-weight: normal;">
                <input type="checkbox" name="role_ids" value="{{ role.id }}">
                {{ role.name }}{% if role.description %} - {{ role.description }}{% endif %}
            </label>
        </div>
        {% endfor %}

        <div class="page-actions" style="margin-top: 16px;">
            <a href="{{ url_for('admin.users_index') }}" class="btn btn-secondary">返回</a>
            <button type="submit" class="btn">建立</button>
        </div>
    </form>
</div>
{% endblock %}
