{% extends "base.html" %}

{% block title %}重設密碼 - Createx{% endblock %}
{% block page_title %}重設密碼{% endblock %}
{% block page_subtitle %}為 {{ target_user.display_name or target_user.username }} 設定新密碼{% endblock %}

{% block content %}
<div class="card" style="max-width: 700px;">
    <form method="post">
        <label>新密碼</label>
        <input type="password" name="new_password" required>

        <div class="page-actions" style="margin-top: 16px;">
            <a href="{{ url_for('admin.users_index') }}" class="btn btn-secondary">返回</a>
            <button type="submit" class="btn">儲存</button>
        </div>
    </form>
</div>
{% endblock %}
