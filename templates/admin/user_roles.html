{% extends "base.html" %}

{% block title %}指派角色 - Createx{% endblock %}
{% block page_title %}指派角色{% endblock %}
{% block page_subtitle %}設定 {{ target_user.display_name or target_user.username }} 的角色{% endblock %}

{% block content %}
<div class="card" style="max-width: 900px;">
    <form method="post">
        {% for role in all_roles %}
        <div style="margin-bottom: 10px;">
            <label style="font-weight: normal;">
                <input type="checkbox" name="role_ids" value="{{ role.id }}" {% if role.id in current_role_ids %}checked{% endif %}>
                {{ role.name }}{% if role.description %} - {{ role.description }}{% endif %}
            </label>
        </div>
        {% endfor %}

        <div class="page-actions" style="margin-top: 16px;">
            <a href="{{ url_for('admin.users_index') }}" class="btn btn-secondary">返回</a>
            <button type="submit" class="btn">儲存</button>
        </div>
    </form>
</div>
{% endblock %}
