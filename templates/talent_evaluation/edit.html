{% extends "base.html" %}

{% block title %}編輯藝人 - Createx{% endblock %}
{% block page_title %}編輯藝人{% endblock %}
{% block page_subtitle %}修改藝人 / 啦啦隊女孩基礎資料{% endblock %}

{% block content %}
<div class="card" style="max-width: 960px;">
    <form method="post">
        <label>藝名 / 顯示名稱</label>
        <input type="text" name="stage_name" value="{{ talent.stage_name }}" required>

        <label>本名</label>
        <input type="text" name="real_name" value="{{ talent.real_name or '' }}">

        <label>性別</label>
        <input type="text" name="gender" value="{{ talent.gender or '' }}">

        <label>國籍</label>
        <input type="text" name="nationality" value="{{ talent.nationality or '' }}">

        <label>生日</label>
        <input type="date" name="birthday" value="{{ talent.birthday or '' }}">

        <label>球團 / 團隊</label>
        <input type="text" name="team_name" value="{{ talent.team_name or '' }}">

        <label>經紀公司</label>
        <input type="text" name="agency_name" value="{{ talent.agency_name or '' }}">

        <label>Instagram 連結</label>
        <input type="url" name="instagram_url" value="{{ talent.instagram_url or '' }}">

        <label>TikTok 連結</label>
        <input type="url" name="tiktok_url" value="{{ talent.tiktok_url or '' }}">

        <label>YouTube 連結</label>
        <input type="url" name="youtube_url" value="{{ talent.youtube_url or '' }}">

        <label>聯絡資訊</label>
        <textarea name="contact_info" rows="3">{{ talent.contact_info or '' }}</textarea>

        <label>狀態</label>
        <select name="status">
            <option value="active" {% if talent.status == 'active' %}selected{% endif %}>觀察中</option>
            <option value="contacting" {% if talent.status == 'contacting' %}selected{% endif %}>接洽中</option>
            <option value="signed" {% if talent.status == 'signed' %}selected{% endif %}>已簽約</option>
            <option value="rejected" {% if talent.status == 'rejected' %}selected{% endif %}>不合作</option>
            <option value="archived" {% if talent.status == 'archived' %}selected{% endif %}>封存</option>
        </select>

        <label>備註</label>
        <textarea name="notes" rows="5">{{ talent.notes or '' }}</textarea>

        <div class="page-actions">
            <a href="{{ url_for('talent_evaluation.detail', talent_id=talent.id) }}" class="btn btn-secondary">返回</a>
            <button type="submit" class="btn">儲存</button>
        </div>
    </form>
</div>
{% endblock %}
